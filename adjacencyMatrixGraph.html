<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Graph</title>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
    html, body { margin: 0; height: 100%; }
    #graph { width: 100vw; height: 100vh; border: 1px solid #ddd; }
  </style>
</head>
<body>
  <div id="graph"></div>
  <script>
    const nodes = new vis.DataSet([{id:1,label:"A"},{id:2,label:"B"},{id:3,label:"C"},{id:4,label:"D"},{id:5,label:"E"}]);
    const edges = new vis.DataSet([{from:1,to:2,label:"A-B"},{from:1,to:3,label:"A-C"},{from:2,to:4,label:"B-D"},{from:2,to:5,label:"B-E"},{from:3,to:4,label:"C-D"},{from:4,to:5,label:"D-E"}]);
    const options = {
      nodes: { shape: "dot", size: 18, font: { size: 16 } },
      edges: { arrows: { to: { enabled: false }, from: { enabled: false } }, font: { align: "middle" } },
      physics: { stabilization: true }
    };
    new vis.Network(document.getElementById("graph"), { nodes, edges }, options);
  </script>
</body>
</html>
